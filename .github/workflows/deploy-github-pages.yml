# Publie .output/public sur la branche gh-pages.
# ⚠️ Réglage obligatoire sur GitHub (une seule fois) :
#    Repo welcome → Settings → Pages
#    Source : « Deploy from a branch » (PAS « GitHub Actions »)
#    Branch : gh-pages  |  Folder : / (root)
# URL : https://lamine58.github.io/welcome/

name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Generate static site (/welcome/)
        run: npm run generate:gh
        env:
          NUXT_APP_BASE_URL: /welcome/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public
          publish_branch: gh-pages

# Déploie le site généré (npm run generate:gh) sur la branche gh-pages.
# Réglage GitHub : Settings → Pages → Source « Deploy from a branch » → gh-pages / (root)
# URL : https://lamine58.github.io/welcome/

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate:gh
        env:
          NUXT_APP_BASE_URL: /welcome/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public
          publish_branch: gh-pages
          commit_message: 'deploy: portfolio 3D'
